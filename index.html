<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Examination Seating Arrangement
    </title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <h1>
            Examination Seating Arrangement System
        </h1>

        <!-- CSV Upload -->

        <div class="card file-upload">

            <label>
                Upload Student CSV File
            </label>

            <input type="file" id="csvFile" accept=".csv">

        </div>
        <p id="studentInfo"></p>

        <!-- Hall Selection -->

        <div class="card">

            <h2>
                Select Available Halls
            </h2>

            <div class="hall-selection">

                <label><input type="checkbox" value="A101"> A101</label>
                <label><input type="checkbox" value="A102"> A102</label>
                <label><input type="checkbox" value="A103"> A103</label>

                <label><input type="checkbox" value="B201"> B201</label>
                <label><input type="checkbox" value="B202"> B202</label>
                <label><input type="checkbox" value="B203"> B203</label>

                <label><input type="checkbox" value="C301"> C301</label>
                <label><input type="checkbox" value="C302"> C302</label>
                <label><input type="checkbox" value="C303"> C303</label>

                <label><input type="checkbox" value="D401"> D401</label>
                <label><input type="checkbox" value="D402"> D402</label>
                <label><input type="checkbox" value="D403"> D403</label>

                <label><input type="checkbox" value="E501"> E501</label>
                <label><input type="checkbox" value="E502"> E502</label>
                <label><input type="checkbox" value="E503"> E503</label>

            </div>

        </div>

        <!-- Buttons -->

        <div class="button-group">

            <button id="generateBtn">

                Generate Seating

            </button>

            <button id="downloadPdfBtn">

                Download PDF

            </button>

        </div>

        <!-- Summary -->

        <div id="summary" class="card"></div>

        <!-- Hall Buttons -->

        <div id="hallButtons" class="hall-buttons"></div>

        <!-- Arrangement -->

        <div id="hallArrangement" class="card"></div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
